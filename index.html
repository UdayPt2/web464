<!DOCTYPE html>
<html>
<head>
<title>Medical Store</title>

<style>
body { margin:0; font-family: Arial; scroll-behavior:smooth; }

/* Navbar */
.navbar{
  background:#0072ff;
  color:white;
  padding:15px;
  display:flex;
  justify-content:center;
  gap:20px;
  position:sticky;
  top:0;
}

.navbar a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

/* Sections */
section{ padding:40px; text-align:center; }

#home{ background:linear-gradient(to right,#43cea2,#185a9d); color:white; }

/* Cards */
.cards{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.card{
  width:150px;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card button{
  margin-top:5px;
  background:green;
  color:white;
  border:none;
  padding:5px;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <a href="#home">Home</a>
  <a href="#tech">Technology</a>
  <a href="#gallery">Gallery</a>
  <a href="#address">Address</a>
</div>

<!-- Home -->
<section id="home">
  <h1>Medical Store</h1>
  <p>Buy medicines easily online</p>
</section>

<!-- Technology -->
<section id="tech">
  <h2>Technology</h2>
  <p>HTML, CSS used for this project.</p>
</section>

<!-- Gallery -->
<section id="gallery">
  <h2>Medicines</h2>
  <div class="cards">

    <div class="card">
      <img src="https://picsum.photos/150/100?1">
      <h4>Medicine 1</h4>
      <p>₹20</p>
      <button>Buy</button>
    </div>

    <div class="card">
      <img src="https://picsum.photos/150/100?2">
      <h4>Medicine 2</h4>
      <p>₹25</p>
      <button>Buy</button>
    </div>

    <div class="card">
      <img src="https://picsum.photos/150/100?3">
      <h4>Medicine 3</h4>
      <p>₹30</p>
      <button>Buy</button>
    </div>

  </div>
</section>

<!-- Address -->
<section id="address">
  <h2>Address</h2>
  <p>Pune, India</p>
  <p>Phone: 9876543210</p>
</section>

</body>
</html>
